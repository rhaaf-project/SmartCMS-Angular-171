<div class="flex min-h-screen items-center justify-center bg-[#060818] px-6 py-10">
    <div class="relative w-full max-w-[480px]">
        <!-- Logo -->
        <div class="mb-8 flex justify-center">
            <img src="/assets/images/SMART_UCX_logo.jpg" alt="SmartTX CMS Logo" class="h-20 rounded-lg object-cover" />
        </div>

        <!-- Login Card -->
        <div class="rounded-xl border border-[#1a2941] bg-[#0e1726] p-8 shadow-2xl">
            <div class="mb-8 text-center">
                <h1 class="text-3xl font-bold text-white">Sign In</h1>
                <p class="mt-2 text-sm text-gray-400">Enter your credentials to access the system</p>
            </div>

            <form class="space-y-5" (submit)="handleLogin($event)">
                <div *ngIf="errorMessage"
                    class="rounded-lg bg-red-500/20 border border-red-500/30 p-3 text-sm text-red-300">
                    {{ errorMessage }}
                </div>

                <div>
                    <label for="Email" class="mb-1 block text-sm font-medium text-gray-400">Email</label>
                    <div class="relative">
                        <input id="Email" type="email" placeholder=""
                            class="form-input border-[#1a2941] bg-[#1a2941]/50 ps-10 text-white placeholder:text-gray-500 focus:border-primary"
                            [(ngModel)]="email" name="email" required />
                        <span class="absolute start-3 top-1/2 -translate-y-1/2 text-gray-500">
                            <icon-mail [fill]="true" />
                        </span>
                    </div>
                </div>

                <div>
                    <label for="Password" class="mb-1 block text-sm font-medium text-gray-400">Password</label>
                    <div class="relative">
                        <input id="Password" [type]="showPassword ? 'text' : 'password'" placeholder=""
                            class="form-input border-[#1a2941] bg-[#1a2941]/50 ps-10 pe-10 text-white placeholder:text-gray-500 focus:border-primary"
                            [(ngModel)]="password" name="password" required />
                        <span class="absolute start-3 top-1/2 -translate-y-1/2 text-gray-500">
                            <icon-lock-dots [fill]="true" />
                        </span>
                        <button type="button" (click)="showPassword = !showPassword"
                            class="absolute end-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary">
                            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path
                                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex cursor-pointer items-center gap-2">
                        <input type="checkbox"
                            class="form-checkbox rounded border-gray-600 bg-transparent text-primary" />
                        <span class="text-sm text-gray-400">Remember Me</span>
                    </label>
                    <span class="text-xs italic text-primary/70">15 min timeout without this</span>
                </div>

                <button type="submit" [disabled]="loading"
                    class="btn w-full border-0 bg-gradient-to-r from-[#6366f1] to-[#7c3aed] py-3 text-base font-semibold text-white shadow-[0_10px_20px_-10px_rgba(99,102,241,0.5)] transition-all hover:shadow-[0_10px_25px_-10px_rgba(99,102,241,0.7)] hover:brightness-110"
                    [ngClass]="{ 'opacity-60 cursor-not-allowed': loading }">
                    <span *ngIf="!loading" class="flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
                            <polyline points="10 17 15 12 10 7" />
                            <line x1="15" y1="12" x2="3" y2="12" />
                        </svg>
                        Sign In
                    </span>
                    <span *ngIf="loading">Signing in...</span>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <p class="mt-8 text-center text-sm text-gray-500">© 2026 SmartUCX All Rights Reserved.</p>
    </div>
</div>
